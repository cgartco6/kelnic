[project]
name = "kelnic"
version = "0.1.0"
description = "Kelnic - AI-Powered All-in-One Business Evolution Platform"
authors = [{ name = "cgartco6" }]
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.6",
    "pydantic>=2.9.2",
    "pydantic-settings>=2.5.2",
    "langchain>=0.3.0",
    "langgraph>=0.2.0",
    "redis>=5.0.8",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.3.0",
    "black>=24.8.0",
    "ruff>=0.6.0",
]

[project.scripts]
kelnic = "backend.main:main"
