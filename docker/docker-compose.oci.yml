version: '3.8'
services:
  redis:
    image: redis:alpine
    restart: unless-stopped
  orchestrator_api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.base
    ports:
      - "8000:8000"
    command: uvicorn evo_core.orchestrator.api:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis
    restart: unless-stopped
  agents:
    build:
      context: ..
      dockerfile: docker/Dockerfile.base
    command: python evo_core/orchestrator/orchestrator.py
    depends_on:
      - redis
    restart: unless-stopped
