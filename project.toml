[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "kelnic"
version = "0.1.0"
dependencies = [
    "fastapi",
    "uvicorn",
    "redis",
    "pymongo",
    "python-dotenv",
    "stripe",
    "paypalrestsdk",
    "requests",
    "numpy",
    "faiss-cpu",
    "opencv-python",
    "reportlab",
    "transformers",
    "torch",
    "scipy",
    "httpx",
    "python-multipart",
    "oci",
    "boto3",
    "tweepy",
    "praw",
    "psutil",
    "web3",
    "pandas",
]
